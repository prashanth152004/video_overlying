version: '3.8'

services:
  app:
    build: .
    container_name: ai_video_translator
    ports:
      - "8501:8501"
    volumes:
      - ./workspace:/app/workspace
    environment:
      - PYTHONUNBUFFERED=1
      - NUMBA_CACHE_DIR=/tmp
    # Uncomment to enable GPU support if applicable:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
